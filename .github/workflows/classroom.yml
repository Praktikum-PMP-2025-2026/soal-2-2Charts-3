name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 1 4 7 4 2 3 6 8"
          expected-output: "MERGED 1 2 3 4 6 7 8"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - kedua list kosong
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - kedua list kosong
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "0 0"
          expected-output: "MERGED EMPTY"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - list pertama kosong
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - list pertama kosong
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "0 3 1 2 3"
          expected-output: "MERGED 1 2 3"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - list kedua kosong
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - list kedua kosong
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 1 2 3 0"
          expected-output: "MERGED 1 2 3"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - duplicates muncul semua
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - duplicates muncul semua
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 1 2 2 4 2 2 3 3"
          expected-output: "MERGED 1 2 2 2 2 3 3"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - satu list seluruhnya lebih kecil
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - satu list seluruhnya lebih kecil
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 1 2 3 3 10 20 30"
          expected-output: "MERGED 1 2 3 10 20 30"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - elemen negatif dan nol
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - elemen negatif dan nol
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "4 -5 -2 0 3 3 -4 -1 2"
          expected-output: "MERGED -5 -4 -2 -1 0 2 3"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - semua elemen sama
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - semua elemen sama
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 5 5 5 2 5 5"
          expected-output: "MERGED 5 5 5 5 5"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - panjang tidak seimbang
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - panjang tidak seimbang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "1 100 5 1 2 3 4 5"
          expected-output: "MERGED 1 2 3 4 5 100"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - interleave penuh
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - interleave penuh
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "4 1 3 5 7 4 2 4 6 8"
          expected-output: "MERGED 1 2 3 4 5 6 7 8"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
